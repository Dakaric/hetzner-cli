name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Build cross-platform archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$VERSION" in
            v[0-9]*) ;;
            *) echo "tag '$VERSION' is not a vX.Y.Z release tag" >&2; exit 1 ;;
          esac

          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            os="${target%/*}"; arch="${target#*/}"
            bin="hetzner"; [ "$os" = "windows" ] && bin="hetzner.exe"
            echo "building $os/$arch"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=$VERSION" -o "$bin" .
            if [ "$os" = "windows" ]; then
              zip -q "dist/hetzner_${os}_${arch}.zip" "$bin"
            else
              tar -czf "dist/hetzner_${os}_${arch}.tar.gz" "$bin"
            fi
            rm -f "$bin"
          done

          (cd dist && sha256sum hetzner_* > SHA256SUMS)
          echo "--- artifacts ---"; ls -l dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: gh release create "$VERSION" dist/* --verify-tag --generate-notes
